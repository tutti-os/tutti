      required:
        - id
        - name
        - lastOpenedAt
      properties:
        id:
          type: string
        name:
          type: string
        lastOpenedAt:
          type: string
          format: date-time
          nullable: true
    DesktopLocale:
      type: string
      enum:
        - en
        - zh-CN
    DesktopThemeSource:
      type: string
      enum:
        - system
        - dark
        - light
