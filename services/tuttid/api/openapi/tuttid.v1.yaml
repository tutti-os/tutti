        - DesktopThemeSourceSystem
        - DesktopThemeSourceDark
        - DesktopThemeSourceLight
    DesktopSleepPreventionMode:
      type: string
      enum:
        - never
        - whileAgentRunning
        - always
    DesktopUpdatePolicy:
      type: string
      enum:
        - off
        - prompt
        - auto
    DesktopUpdateChannel:
      type: string
      enum:
        - stable
        - rc
    DesktopDockPlacement:
      type: string
      enum:
        - bottom
        - left
    DesktopDockIconStyle:
      type: string
      enum:
        - default
        - flat
    DesktopBrowserUseConnectionMode:
      type: string
      enum:
        - isolated
        - autoConnect
    DesktopAppCatalogChannel:
      type: string
      enum:
        - production
        - staging
    DeletedAgentConversationRetentionDays:
      type: integer
