openapi: 3.0.3
info:
  title: tuttid API
  version: 0.1.0
  description: Versioned local daemon API for tutti desktop, CLI, and approved local integrations.
x-tutti-openapi-fragments:
  - packages/workspace/issue-manager/openapi/issue-manager.v1.yaml
  - services/tuttid/api/openapi/mobile-remote-access.v1.yaml
servers:
  - url: http://127.0.0.1:4545
security:
  - bearerAuth: []
tags:
  - name: workspace-agent
    description: Workspace-scoped selectable Agent directory
  - name: runtime
  - name: account
  - name: analytics
  - name: cli
    description: Public local capability protocol for the bundled CLI and future approved local integrations. Command metadata is machine-readable protocol data; command execution remains authorized by the daemon bearer token and filtered by daemon-owned context.
  - name: preferences
  - name: workspace
  - name: terminal
  - name: agent-session
  - name: agent-target
  - name: workspace-workflow
  - name: agent-context
  - name: app-center
  - name: app-factory
  - name: user-project
  - name: agent-quick-prompt
paths:
  /v1/health:
    get:
      operationId: getHealth
      tags:
        - runtime
      summary: Get daemon health status
      responses:
        "200":
          description: Daemon health status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatusResponse"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "405":
          $ref: "#/components/responses/MethodNotAllowedError"
  /v1/track:
    post:
      operationId: trackEvents
      tags:
        - analytics
      summary: Accept analytics events from approved local clients
      description: Accepts renderer-originated analytics events. Delivery to the analytics backend is handled asynchronously by tuttid.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TrackEventsRequest"
      responses:
        "202":
          description: Analytics events accepted for asynchronous delivery
        "400":
          $ref: "#/components/responses/InvalidRequestError"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "405":
          $ref: "#/components/responses/MethodNotAllowedError"
        "503":
          $ref: "#/components/responses/ServiceUnavailableError"
  /v1/account/login/start:
    post:
      operationId: startAccountLogin
      tags:
        - account
      summary: Start desktop account login
      responses:
        "200":
          description: Login attempt started
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AccountLoginStartResponse"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "405":
          $ref: "#/components/responses/MethodNotAllowedError"
        "503":
          $ref: "#/components/responses/ServiceUnavailableError"
  /v1/account/login/status:
    get:
      operationId: getAccountLoginStatus
      tags:
        - account
      summary: Get desktop account login status
      parameters:
        - name: attempt_id
          in: query
          required: true
          schema:
            type: string
            minLength: 1
      responses:
        "200":
          description: Login attempt status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AccountLoginStatusResponse"
        "400":
          $ref: "#/components/responses/InvalidRequestError"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "405":
          $ref: "#/components/responses/MethodNotAllowedError"
        "503":
          $ref: "#/components/responses/ServiceUnavailableError"
  /v1/account/user_info:
    get:
      operationId: getAccountUserInfo
      tags:
        - account
      summary: Get current desktop account user
      responses:
        "200":
          description: Current account user, if signed in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AccountUserInfoResponse"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "405":
          $ref: "#/components/responses/MethodNotAllowedError"
        "503":
          $ref: "#/components/responses/ServiceUnavailableError"
  /v1/account/product_summary:
    get:
      operationId: getAccountProductSummary
      tags:
        - account
      summary: Get current account membership and credits summary
      description: Returns desktop-safe account product state. tuttid reads the local account session and calls supported Tutti web APIs with the session cookie; session credentials are never returned to the renderer.
      responses:
        "200":
          description: Current account product summary, if signed in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AccountProductSummaryResponse"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "405":
          $ref: "#/components/responses/MethodNotAllowedError"
        "503":
          $ref: "#/components/responses/ServiceUnavailableError"
  /v1/account/registration_credits_reward/dismiss:
    post:
      operationId: dismissAccountRegistrationCreditsReward
      tags:
        - account
      summary: Mark the current registration credits reward toast as shown
      description: Marks a desktop-safe registration credits reward event as shown after the renderer has displayed or dismissed the toast. tuttid keeps session credentials local and never returns them to the renderer.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DismissAccountRegistrationCreditsRewardRequest"
      responses:
        "204":
          description: Registration credits reward marked as shown
        "400":
          $ref: "#/components/responses/InvalidRequestError"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "405":
          $ref: "#/components/responses/MethodNotAllowedError"
        "503":
          $ref: "#/components/responses/ServiceUnavailableError"
  /v1/account/logout:
    post:
      operationId: logoutAccount
      tags:
        - account
      summary: Sign out current desktop account
      responses:
        "204":
          description: Account signed out
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "405":
          $ref: "#/components/responses/MethodNotAllowedError"
        "503":
          $ref: "#/components/responses/ServiceUnavailableError"
  /v1/cli/capabilities:
    get:
      operationId: listCliCapabilities
      tags:
        - cli
      summary: List CLI capabilities visible in the current context
      description: Returns daemon-owned command metadata that clients can use to route user commands without duplicating business rules or workspace resolution.
      parameters:
        - name: workspaceID
          in: query
          required: false
          schema:
            type: string
          description: Optional workspace context. When omitted, the daemon uses the startup workspace.
        - name: includeHidden
          in: query
          required: false
          schema:
            type: boolean
            default: false
          description: Include capabilities hidden from ordinary CLI command discovery by provider availability filters and command visibility. Intended for metadata consumers, not ordinary user command routing.
        - name: includeIntegration
          in: query
          required: false
          schema:
            type: boolean
            default: false
          description: Include integration-only commands while preserving provider availability filters. Intended for app-runtime integrations.
      responses:
        "200":
          description: Visible CLI capabilities
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CliCapabilitiesResponse"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "405":
          $ref: "#/components/responses/MethodNotAllowedError"
        "503":
          $ref: "#/components/responses/ServiceUnavailableError"
  /v1/cli/commands/{commandID}/invoke:
    post:
      operationId: invokeCliCommand
      tags:
        - cli
      summary: Invoke one registered CLI command
      description: Invokes a daemon-owned capability by stable command id. The daemon validates context, resolves workspace state, applies edition filtering, and returns presentation-neutral command output.
      parameters:
        - $ref: "#/components/parameters/CliCommandID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CliInvokeRequest"
      responses:
        "200":
          description: CLI command result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CliInvokeResponse"
        "400":
          $ref: "#/components/responses/InvalidRequestError"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "404":
          $ref: "#/components/responses/InvalidRequestError"
        "405":
          $ref: "#/components/responses/MethodNotAllowedError"
        "502":
          $ref: "#/components/responses/WorkspaceOperationError"
        "503":
          $ref: "#/components/responses/ServiceUnavailableError"
  /v1/workspaces/{workspaceID}/agent-context/workspace-app-mentions:
    parameters:
      - $ref: "#/components/parameters/WorkspaceID"
    get:
      operationId: listWorkspaceAppMentionCandidates
      tags:
        - agent-context
      summary: List workspace app mention candidates for agent context pickers
      description: >
        Returns daemon-owned application mention candidates for Agent GUI and
        rich-text context pickers. Real workspace apps are filtered by App Center
        installation and enabled state. CLI capabilities only enrich search
        metadata; this endpoint does not run command-routing availability
        filters or agent provider auth checks.
      responses:
        "200":
          description: Workspace app mention candidates
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkspaceAppMentionCandidatesResponse"
        "400":
          $ref: "#/components/responses/InvalidRequestError"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "404":
          $ref: "#/components/responses/WorkspaceNotFoundError"
        "405":
          $ref: "#/components/responses/MethodNotAllowedError"
        "502":
          $ref: "#/components/responses/WorkspaceOperationError"
        "503":
          $ref: "#/components/responses/ServiceUnavailableError"
  /v1/preferences/desktop:
    get:
      operationId: getDesktopPreferences
      tags:
        - preferences
      summary: Get persisted desktop preferences
      responses:
        "200":
          description: Desktop preferences state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DesktopPreferencesStateResponse"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "405":
          $ref: "#/components/responses/MethodNotAllowedError"
        "502":
          $ref: "#/components/responses/PreferencesOperationError"
        "503":
          $ref: "#/components/responses/ServiceUnavailableError"
    put:
      operationId: putDesktopPreferences
      tags:
        - preferences
      summary: Persist desktop preferences
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PutDesktopPreferencesRequest"
      responses:
        "200":
          description: Desktop preferences persisted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DesktopPreferencesStateResponse"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "400":
          $ref: "#/components/responses/InvalidRequestError"
        "405":
          $ref: "#/components/responses/MethodNotAllowedError"
        "502":
          $ref: "#/components/responses/PreferencesOperationError"
        "503":
          $ref: "#/components/responses/ServiceUnavailableError"
  /v1/agent-maintenance/deleted-conversations/purge:
    post:
      operationId: purgeDeletedAgentConversations
      tags:
        - agent-maintenance
      summary: Permanently purge all soft-deleted Agent conversations
      responses:
        "200":
          description: Purge completed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeletedAgentConversationPurgeResult"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "405":
          $ref: "#/components/responses/MethodNotAllowedError"
        "502":
          $ref: "#/components/responses/WorkspaceOperationError"
        "503":
          $ref: "#/components/responses/ServiceUnavailableError"
  /v1/agent-quick-prompts:
    get:
      operationId: listAgentQuickPrompts
      tags:
        - agent-quick-prompt
      summary: List device-local Agent quick prompts
      responses:
        "200":
          description: Agent quick prompt list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentQuickPromptListResponse"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "405":
          $ref: "#/components/responses/MethodNotAllowedError"
        "502":
          $ref: "#/components/responses/AgentQuickPromptOperationError"
        "503":
          $ref: "#/components/responses/ServiceUnavailableError"
    post:
      operationId: createAgentQuickPrompt
      tags:
        - agent-quick-prompt
      summary: Create a device-local Agent quick prompt
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAgentQuickPromptRequest"
      responses:
        "201":
          description: Agent quick prompt created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentQuickPromptResponse"
        "400":
          $ref: "#/components/responses/InvalidRequestError"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "405":
          $ref: "#/components/responses/MethodNotAllowedError"
        "409":
          $ref: "#/components/responses/AgentQuickPromptConflictError"
        "502":
          $ref: "#/components/responses/AgentQuickPromptOperationError"
        "503":
          $ref: "#/components/responses/ServiceUnavailableError"
  /v1/agent-quick-prompts/move:
    post:
      operationId: moveAgentQuickPrompt
      tags:
        - agent-quick-prompt
      summary: Move a device-local Agent quick prompt before an anchor or to the end
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MoveAgentQuickPromptRequest"
      responses:
        "200":
          description: Authoritative Agent quick prompt order
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentQuickPromptListResponse"
        "400":
          $ref: "#/components/responses/InvalidRequestError"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "404":
          $ref: "#/components/responses/AgentQuickPromptNotFoundError"
        "405":
          $ref: "#/components/responses/MethodNotAllowedError"
        "409":
          $ref: "#/components/responses/AgentQuickPromptConflictError"
        "502":
          $ref: "#/components/responses/AgentQuickPromptOperationError"
        "503":
          $ref: "#/components/responses/ServiceUnavailableError"
  /v1/agent-quick-prompts/{promptId}:
    parameters:
      - name: promptId
        in: path
        required: true
        schema:
          type: string
          minLength: 1
    put:
      operationId: updateAgentQuickPrompt
      tags:
        - agent-quick-prompt
      summary: Update a device-local Agent quick prompt
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateAgentQuickPromptRequest"
      responses:
        "200":
          description: Agent quick prompt updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentQuickPromptResponse"
        "400":
          $ref: "#/components/responses/InvalidRequestError"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "404":
          $ref: "#/components/responses/AgentQuickPromptNotFoundError"
        "405":
          $ref: "#/components/responses/MethodNotAllowedError"
        "409":
          $ref: "#/components/responses/AgentQuickPromptConflictError"
        "502":
          $ref: "#/components/responses/AgentQuickPromptOperationError"
        "503":
          $ref: "#/components/responses/ServiceUnavailableError"
    delete:
      operationId: deleteAgentQuickPrompt
      tags:
        - agent-quick-prompt
      summary: Delete a device-local Agent quick prompt
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DeleteAgentQuickPromptRequest"
      responses:
        "204":
          description: Agent quick prompt deleted
        "400":
          $ref: "#/components/responses/InvalidRequestError"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "404":
          $ref: "#/components/responses/AgentQuickPromptNotFoundError"
        "405":
          $ref: "#/components/responses/MethodNotAllowedError"
        "409":
          $ref: "#/components/responses/AgentQuickPromptConflictError"
        "502":
          $ref: "#/components/responses/AgentQuickPromptOperationError"
        "503":
          $ref: "#/components/responses/ServiceUnavailableError"
  /v1/user-projects:
    get:
      operationId: listUserProjects
      tags:
        - user-project
      summary: List user project directories in durable order
      responses:
        "200":
          description: User project list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProjectListResponse"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "405":
          $ref: "#/components/responses/MethodNotAllowedError"
        "502":
          $ref: "#/components/responses/PreferencesOperationError"
        "503":
          $ref: "#/components/responses/ServiceUnavailableError"
    post:
      operationId: useUserProject
      tags:
        - user-project
      summary: Record a user project directory usage
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UseUserProjectRequest"
      responses:
        "201":
          description: User project usage recorded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProjectResponse"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "400":
          $ref: "#/components/responses/InvalidRequestError"
        "405":
          $ref: "#/components/responses/MethodNotAllowedError"
        "502":
          $ref: "#/components/responses/PreferencesOperationError"
        "503":
          $ref: "#/components/responses/ServiceUnavailableError"
    delete:
      operationId: deleteUserProject
      tags:
        - user-project
      summary: Remove a user project directory from the ordered project list
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DeleteUserProjectRequest"
      responses:
        "204":
          description: User project removed
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "400":
          $ref: "#/components/responses/InvalidRequestError"
        "405":
          $ref: "#/components/responses/MethodNotAllowedError"
        "502":
          $ref: "#/components/responses/PreferencesOperationError"
        "503":
          $ref: "#/components/responses/ServiceUnavailableError"
  /v1/user-projects/check:
    post:
      operationId: checkUserProjectPath
      tags:
        - user-project
      summary: Check a user project directory path without recording usage
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CheckUserProjectPathRequest"
      responses:
        "200":
          description: User project path status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProjectPathCheckResponse"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "400":
          $ref: "#/components/responses/InvalidRequestError"
        "405":
          $ref: "#/components/responses/MethodNotAllowedError"
        "502":
          $ref: "#/components/responses/PreferencesOperationError"
        "503":
          $ref: "#/components/responses/ServiceUnavailableError"
  /v1/user-projects/move:
    post:
      operationId: moveUserProject
      tags:
        - user-project
      summary: Move a user project within its pinned or unpinned partition
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MoveUserProjectRequest"
      responses:
        "200":
          description: Complete ordered user project list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProjectListResponse"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "400":
          $ref: "#/components/responses/InvalidRequestError"
        "405":
          $ref: "#/components/responses/MethodNotAllowedError"
        "502":
          $ref: "#/components/responses/PreferencesOperationError"
        "503":
          $ref: "#/components/responses/ServiceUnavailableError"
  /v1/user-projects/pin:
    post:
      operationId: pinUserProject
      tags:
        - user-project
      summary: Pin or unpin a user project
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PinUserProjectRequest"
      responses:
        "200":
          description: Complete ordered user project list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProjectListResponse"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "400":
          $ref: "#/components/responses/InvalidRequestError"
        "405":
          $ref: "#/components/responses/MethodNotAllowedError"
        "502":
          $ref: "#/components/responses/PreferencesOperationError"
        "503":
          $ref: "#/components/responses/ServiceUnavailableError"
  /v1/events/ws:
    get:
      operationId: attachEventStream
      tags:
        - event-stream
      summary: Attach a WebSocket stream to daemon business events
      responses:
        "200":
          description: Event stream upgrade endpoint
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "400":
          $ref: "#/components/responses/InvalidRequestError"
        "405":
          $ref: "#/components/responses/MethodNotAllowedError"
        "503":
          $ref: "#/components/responses/ServiceUnavailableError"
  /v1/agent-targets:
    get:
      operationId: listAgentTargets
      tags:
        - agent-target
      summary: List daemon-owned Agent Targets
      description: Returns durable Agent Target records. The launch ref is a controlled union and not a free-form configuration blob.
      responses:
        "200":
          description: Agent Targets
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListAgentTargetsResponse"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "405":
          $ref: "#/components/responses/MethodNotAllowedError"
        "502":
          $ref: "#/components/responses/PreferencesOperationError"
        "503":
          $ref: "#/components/responses/ServiceUnavailableError"
  /v1/agent-targets/{agentTargetID}/enabled:
    patch:
      operationId: setSystemAgentTargetEnabled
      tags:
        - agent-target
      summary: Enable or disable one daemon-owned system Agent Target
      description: Desktop control-plane operation that changes only the enabled field of an existing system Agent Target. It is not exposed as a Workspace App CLI capability.
      parameters:
        - name: agentTargetID
          in: path
          required: true
          schema:
            type: string
            minLength: 1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SetSystemAgentTargetEnabledRequest"
      responses:
        "200":
          description: Updated system Agent Target
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentTarget"
        "400":
          $ref: "#/components/responses/InvalidRequestError"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "405":
          $ref: "#/components/responses/MethodNotAllowedError"
        "502":
          $ref: "#/components/responses/PreferencesOperationError"
        "503":
          $ref: "#/components/responses/ServiceUnavailableError"
  /v1/workspaces/{workspaceID}/agent-targets/{agentTargetID}/setup:
    parameters:
      - $ref: "#/components/parameters/WorkspaceID"
      - name: agentTargetID
        in: path
        required: true
        schema:
          type: string
          minLength: 1
    get:
      operationId: getAgentTargetSetup
      tags:
        - agent-target
      summary: Resolve Agent Target setup state
      description: >
        Prefers a compatible local runtime. Otherwise returns a daemon-derived
        installation plan and any durable install action for the fixed Target.
        The managed runtime is installed under the user's stable ~/.local data
        root and is reused across workspaces. Clients cannot submit runner args,
        package identity, executable paths, or installation roots.
      responses:
        "200":
          description: Target setup state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentTargetSetupSnapshot"
        "400":
          $ref: "#/components/responses/InvalidRequestError"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "404":
          $ref: "#/components/responses/WorkspaceNotFoundError"
        "405":
          $ref: "#/components/responses/MethodNotAllowedError"
        "502":
          $ref: "#/components/responses/WorkspaceOperationError"
        "503":
          $ref: "#/components/responses/ServiceUnavailableError"
  /v1/workspaces/{workspaceID}/agent-targets/{agentTargetID}/setup/install:
    parameters:
      - $ref: "#/components/parameters/WorkspaceID"
      - name: agentTargetID
        in: path
        required: true
        schema:
          type: string
          minLength: 1
    post:
      operationId: installAgentTargetRuntime
      tags:
        - agent-target
      summary: Start an Agent Target runtime installation
      description: >
        Recomputes the trusted installation plan, verifies its digest, then
        starts or returns the durable idempotent action identified by
        clientActionId. The daemon owns all executable arguments and paths.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InstallAgentTargetRuntimeRequest"
      responses:
        "200":
          description: Current Target setup state
