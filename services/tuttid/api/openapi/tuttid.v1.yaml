    get:
      operationId: getAgentProviderStatuses
      tags:
        - agent-session
      summary: Get local agent provider availability and action status
      parameters:
        - name: providers
          in: query
          required: false
          style: form
          explode: true
          schema:
            type: array
            items:
              $ref: "#/components/schemas/WorkspaceAgentProvider"
        - name: includeNetwork
          in: query
          required: false
          description: >-
            Opt into the network connectivity probe (registry / provider API /
            proxy reachability). Off by default so the common detection path
            stays local and never blocks on the network; only the agent-env
            wizard's network diagnostic sets this.
          schema:
            type: boolean
        - name: includeUpdates
          in: query
          required: false
          description: >-
            Opt into cached remote update discovery for provider CLIs. Off by
            default so ordinary readiness and status requests stay purely
            local. Discovery failures are reported on each provider's update
            status and do not fail the status request.
          schema:
            type: boolean
        - name: refresh
          in: query
          required: false
          description: >-
            Bypass only the daemon's local provider-readiness cache. This does
            not opt into or refresh remote update discovery.
          schema:
            type: boolean
        - name: refreshUpdates
          in: query
          required: false
          description: >-
            Bypass only the provider update-metadata cache when includeUpdates
            is true. This does not bypass local readiness or network-diagnostic
            caches and does not opt into discovery by itself.
          schema:
            type: boolean
      responses:
        "200":
          description: Agent provider status snapshot
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentProviderStatusListResponse"
