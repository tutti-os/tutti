        agentConversationDetailMode:
          $ref: "#/components/schemas/DesktopAgentConversationDetailMode"
        agentDockLayout:
          $ref: "#/components/schemas/DesktopAgentDockLayout"
        appCatalogChannel:
          $ref: "#/components/schemas/DesktopAppCatalogChannel"
        browserUseConnectionMode:
          $ref: "#/components/schemas/DesktopBrowserUseConnectionMode"
        defaultAgentProvider:
          $ref: "#/components/schemas/DesktopDefaultAgentProvider"
        dockIconStyle:
          $ref: "#/components/schemas/DesktopDockIconStyle"
