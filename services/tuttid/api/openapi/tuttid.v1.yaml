        - modelPlanId
        - model
        - permissionModeId
        - reasoningEffort
        - executionDirectory
        - dependsOn
        - parallelizable
        - autoAccept
      properties:
        id:
          type: string
          minLength: 1
        title:
          type: string
          minLength: 1
        content:
          type: string
        priority:
          type: string
          enum:
            - high
            - medium
            - low
        agentTargetId:
          type: string
          nullable: true
        modelPlanId:
          type: string
          nullable: true
        model:
          type: string
          nullable: true
        permissionModeId:
          type: string
          nullable: true
          description: Task-level permission mode applied when the materialized Issue task launches.
        reasoningEffort:
          type: string
          nullable: true
          description: Task-level reasoning effort applied when the materialized Issue task launches.
        executionDirectory:
          type: string
          nullable: true
        dependsOn:
          type: array
          uniqueItems: true
          items:
            type: string
            minLength: 1
        parallelizable:
          type: boolean
          description: >-
            Opts this task out of the sequential default so it may run
            alongside other ready tasks. Persisted onto the materialized
            Issue task.
        autoAccept:
          type: boolean
          description: >-
            Bypasses the human acceptance gate: a successful completion is
            accepted automatically and dispatch advances. Persisted onto the
            materialized Issue task.
    TuttiModePlanDocument:
      type: object
      additionalProperties: false
      required:
        - schema
        - phase
        - title
        - topicId
        - markdownBody
        - execution
        - budget
        - tasks
      properties:
        schema:
          type: string
          enum:
            - tutti-mode-plan/v1
        phase:
          type: string
          enum:
            - configuration
            - task_graph
        title:
          type: string
          minLength: 1
        topicId:
          type: string
          minLength: 1
        markdownBody:
          type: string
          minLength: 1
        execution:
          $ref: "#/components/schemas/TuttiModePlanExecution"
        budget:
          $ref: "#/components/schemas/TuttiModePlanBudget"
        tasks:
          type: array
          items:
            $ref: "#/components/schemas/TuttiModePlanTask"
    WorkspaceWorkflowPlanRevision:
      type: object
      additionalProperties: false
      required:
        - id
        - workflowId
        - sequence
        - schemaVersion
        - documentPath
        - sha256
        - producedByTurnId
        - createdAtUnixMs
        - document
      properties:
        id:
          type: string
          format: uuid
        workflowId:
          type: string
          format: uuid
        sequence:
          type: integer
          minimum: 1
        schemaVersion:
          type: string
          enum:
            - tutti-mode-plan/v1
        documentPath:
          type: string
          minLength: 1
        sha256:
          type: string
          pattern: "^[0-9a-f]{64}$"
        producedByTurnId:
          type: string
          nullable: true
        createdAtUnixMs:
          type: integer
          format: int64
          minimum: 0
        document:
          $ref: "#/components/schemas/TuttiModePlanDocument"
    WorkspaceWorkflowCheckpoint:
      type: object
      additionalProperties: false
      required:
        - id
        - workflowId
        - kind
        - revisionId
        - status
        - decidedBy
        - decisionReason
        - createdAtUnixMs
        - updatedAtUnixMs
        - decidedAtUnixMs
      properties:
        id:
          type: string
          format: uuid
        workflowId:
          type: string
          format: uuid
        kind:
          type: string
          enum:
            - configuration_review
            - task_review
        revisionId:
          type: string
          format: uuid
        status:
          type: string
          enum:
            - pending
            - accepted
            - rejected
            - superseded
            - canceled
        decidedBy:
          type: string
          nullable: true
        decisionReason:
          type: string
          nullable: true
        createdAtUnixMs:
          type: integer
          format: int64
          minimum: 0
        updatedAtUnixMs:
          type: integer
          format: int64
          minimum: 0
        decidedAtUnixMs:
          type: integer
          format: int64
          minimum: 0
          nullable: true
    WorkspaceWorkflowTurnLink:
      type: object
      additionalProperties: false
      required:
        - workflowId
        - turnId
        - relation
        - createdAtUnixMs
      properties:
        workflowId:
          type: string
          format: uuid
        turnId:
          type: string
          minLength: 1
        relation:
          type: string
          enum:
            - source
            - decomposition
            - revision
            - feedback
        createdAtUnixMs:
          type: integer
          format: int64
          minimum: 0
    WorkspaceWorkflowOperation:
      type: object
      additionalProperties: false
      required:
        - id
        - workflowId
        - kind
        - status
        - revisionId
        - issueId
        - errorCode
        - errorMessage
        - createdAtUnixMs
        - updatedAtUnixMs
        - startedAtUnixMs
        - completedAtUnixMs
      properties:
        id:
          type: string
          format: uuid
        workflowId:
          type: string
          format: uuid
        kind:
          type: string
          enum:
            - generate_task_graph
            - create_revision
            - create_issue
            - start_issue
        status:
          type: string
          enum:
            - pending
            - running
            - succeeded
            - failed
            - canceled
        revisionId:
          type: string
          format: uuid
          nullable: true
        issueId:
          type: string
          nullable: true
        errorCode:
          type: string
          nullable: true
        errorMessage:
          type: string
          nullable: true
        createdAtUnixMs:
          type: integer
          format: int64
          minimum: 0
        updatedAtUnixMs:
          type: integer
          format: int64
          minimum: 0
        startedAtUnixMs:
          type: integer
          format: int64
          minimum: 0
          nullable: true
        completedAtUnixMs:
          type: integer
          format: int64
          minimum: 0
          nullable: true
    WorkspaceWorkflowSnapshot:
      type: object
      additionalProperties: false
      required:
        - workflow
        - revisions
        - checkpoints
        - turnLinks
        - operations
        - actionableItems
      properties:
        workflow:
          $ref: "#/components/schemas/WorkspaceWorkflow"
        revisions:
          type: array
          items:
            $ref: "#/components/schemas/WorkspaceWorkflowPlanRevision"
        checkpoints:
          type: array
          items:
            $ref: "#/components/schemas/WorkspaceWorkflowCheckpoint"
        turnLinks:
          type: array
          items:
            $ref: "#/components/schemas/WorkspaceWorkflowTurnLink"
        operations:
          type: array
          items:
            $ref: "#/components/schemas/WorkspaceWorkflowOperation"
        actionableItems:
          type: array
          description: Read-only projection of the accepted current task graph; never an independent mutable record.
          items:
            $ref: "#/components/schemas/WorkspaceWorkflowActionableItem"
    WorkspaceWorkflowActionableItem:
      type: object
      additionalProperties: false
      required:
        - id
        - sourceWorkflowId
        - sourceRevisionId
        - ordinal
        - topicId
        - execution
        - budget
        - task
      properties:
        id:
          type: string
          minLength: 1
        sourceWorkflowId:
          type: string
          format: uuid
        sourceRevisionId:
          type: string
          format: uuid
        ordinal:
          type: integer
          minimum: 1
        topicId:
          type: string
          minLength: 1
        execution:
          $ref: "#/components/schemas/TuttiModePlanExecution"
        budget:
          $ref: "#/components/schemas/TuttiModePlanBudget"
        task:
          $ref: "#/components/schemas/TuttiModePlanTask"
    WorkspaceWorkflowListResponse:
      type: object
      additionalProperties: false
      required:
        - workflows
      properties:
        workflows:
          type: array
          items:
            $ref: "#/components/schemas/WorkspaceWorkflowSnapshot"
    WorkspaceWorkflowTaskAssignment:
      type: object
      additionalProperties: false
      description: >-
        User-owned per-task assignment override recorded with an accepted task
        review decision. Null fields keep the plan document value; empty
        strings clear it.
      required:
        - taskId
      properties:
        taskId:
          type: string
          minLength: 1
        agentTargetId:
          type: string
          nullable: true
        modelPlanId:
          type: string
          nullable: true
        model:
          type: string
          nullable: true
        permissionModeId:
          type: string
          nullable: true
        reasoningEffort:
          type: string
          nullable: true
        parallelizable:
          type: boolean
          nullable: true
          description: Overrides the plan document's per-task parallel opt-in; null keeps it.
        autoAccept:
          type: boolean
          nullable: true
          description: Overrides the plan document's per-task acceptance bypass; null keeps it.
    DecideWorkspaceWorkflowCheckpointRequest:
      type: object
      additionalProperties: false
      required:
        - decision
        - decidedBy
      properties:
        decision:
          type: string
          enum:
            - accepted
            - rejected
            - canceled
        decidedBy:
          type: string
          minLength: 1
        reason:
          type: string
          nullable: true
        taskAssignments:
          type: array
          nullable: true
          description: >-
            Optional per-task assignment overrides. Only valid when accepting
            a task review checkpoint; recorded durably with the decision and
            merged into the materialized Issue tasks.
          items:
            $ref: "#/components/schemas/WorkspaceWorkflowTaskAssignment"
    CreateWorkspaceRequest:
      type: object
      additionalProperties: false
      required:
        - name
      properties:
        name:
          type: string
          minLength: 1
    UpdateWorkspaceRequest:
      type: object
      additionalProperties: false
      required:
        - name
      properties:
        name:
          type: string
          minLength: 1
