        - agentConversationDetailMode
        - agentDockLayout
        - appCatalogChannel
        - defaultAgentProvider
        - dockIconStyle
        - dockPlacement
        - deletedAgentConversationRetentionDays
        - fileDefaultOpenersByExtension
        - featureFlags
        - workbenchShortcuts
        - locale
