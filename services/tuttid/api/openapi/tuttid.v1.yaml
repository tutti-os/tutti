  responses:
    UnauthorizedError:
      description: Bearer token is missing or invalid
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiErrorResponse"
          examples:
            unauthorized:
              value:
                error:
                  code: unauthorized
                  reason: missing_or_invalid_token
                  developerMessage: daemon request is not authorized
    InvalidRequestError:
      description: Request payload or parameters are invalid
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiErrorResponse"
          examples:
            invalidRequest:
              value:
                error:
                  code: invalid_request
                  reason: missing_workspace_id
                  developerMessage: workspace id is required
    MethodNotAllowedError:
      description: HTTP method is not supported on this route
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiErrorResponse"
          examples:
            methodNotAllowed:
              value:
                error:
                  code: method_not_allowed
                  reason: method_not_allowed
                  developerMessage: method not allowed
    ServiceUnavailableError:
      description: Required daemon service dependency is unavailable
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiErrorResponse"
          examples:
            serviceUnavailable:
              value:
                error:
                  code: service_unavailable
                  reason: workspace_service_unavailable
                  developerMessage: workspace service is unavailable
    WorkspaceNotFoundError:
      description: Workspace id was not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiErrorResponse"
          examples:
            workspaceNotFound:
              value:
                error:
                  code: workspace_not_found
                  reason: workspace_not_found
                  developerMessage: workspace not found
    WorkspaceFileNotFoundError:
      description: Workspace file entry was not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiErrorResponse"
          examples:
            workspaceFileNotFound:
              value:
                error:
                  code: workspace_file_not_found
                  reason: workspace_file_not_found
                  developerMessage: workspace file entry not found
    WorkspaceTerminalNotFoundError:
      description: Workspace terminal session was not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiErrorResponse"
          examples:
            workspaceTerminalNotFound:
              value:
                error:
                  code: workspace_terminal_not_found
                  reason: workspace_terminal_not_found
                  developerMessage: workspace terminal session not found
    WorkspaceAppNotFoundError:
      description: Workspace app was not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiErrorResponse"
          examples:
            workspaceAppNotFound:
              value:
                error:
                  code: workspace_app_not_found
                  reason: workspace_app_not_found
                  developerMessage: workspace app not found
    WorkspaceOperationError:
      description: Workspace operation failed in an upstream adapter or command
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiErrorResponse"
          examples:
            workspaceOperationFailed:
              value:
                error:
                  code: workspace_operation_failed
                  reason: workspace_operation_failed
                  developerMessage: workspace operation failed
    AgentTargetNotFoundError:
      description: Agent target was not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiErrorResponse"
          examples:
            agentTargetNotFound:
              value:
                error:
                  code: agent_target_not_found
                  reason: agent_target_not_found
                  developerMessage: agent target not found
    ModelPlanNotFoundError:
      description: Model access plan was not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiErrorResponse"
          examples:
            modelPlanNotFound:
              value:
                error:
                  code: model_plan_not_found
                  reason: model_plan_not_found
                  developerMessage: model plan not found
    ModelPlanReferencedError:
      description: Model plan is still referenced by agent targets
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiErrorResponse"
          examples:
            modelPlanReferenced:
              value:
                error:
                  code: model_plan_referenced
                  reason: model_plan_referenced
                  developerMessage: model plan is still referenced; rebind or disable consumers first
    ModelPolicyReferencedError:
      description: Model usage policy is still referenced by agent bindings
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiErrorResponse"
          examples:
            modelPolicyReferenced:
              value:
                error:
                  code: model_policy_referenced
                  reason: model_policy_referenced
                  developerMessage: model usage policy is still referenced; rebind or clear the referencing bindings first
    PreferencesOperationError:
      description: Desktop preferences operation failed in an upstream adapter or command
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiErrorResponse"
          examples:
            preferencesOperationFailed:
              value:
                error:
                  code: preferences_operation_failed
                  reason: preferences_operation_failed
                  developerMessage: desktop preferences operation failed
    AgentQuickPromptNotFoundError:
      description: Agent quick prompt was not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiErrorResponse"
    AgentQuickPromptConflictError:
      description: Agent quick prompt limit, expected version, or ordering anchor conflicts with current state
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiErrorResponse"
    AgentQuickPromptOperationError:
      description: Agent quick prompt persistence operation failed
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiErrorResponse"
  schemas:
    HealthStatusResponse:
      type: object
      additionalProperties: false
      required:
        - service
        - status
      properties:
        service:
          type: string
        status:
          type: string
          enum:
            - ok
    TrackEventsRequest:
      type: object
      additionalProperties: false
      required:
        - events
      properties:
        events:
          type: array
          minItems: 1
          maxItems: 100
          items:
            $ref: "#/components/schemas/TrackEvent"
    TrackEvent:
      type: object
      additionalProperties: false
      required:
        - name
        - client_ts
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 128
          pattern: "^[a-z][a-z0-9_]*(?:\\.[a-z][a-z0-9_]*)+$"
        client_ts:
          type: integer
          format: int64
          minimum: 1
        params:
          type: object
          additionalProperties: true
    AccountUserInfo:
      type: object
      additionalProperties: false
      required:
        - user_id
      properties:
        user_id:
          type: string
          minLength: 1
        name:
          type: string
          nullable: true
        email:
          type: string
          nullable: true
        avatar:
          type: string
          nullable: true
    AccountUserInfoResponse:
      type: object
      additionalProperties: false
      required:
        - user
      properties:
        user:
          allOf:
            - $ref: "#/components/schemas/AccountUserInfo"
          nullable: true
    AccountMembershipSummary:
      type: object
      additionalProperties: false
      required:
        - tier_key
        - display_name
      properties:
        tier_key:
          type: string
          minLength: 1
        display_name:
          type: string
          minLength: 1
        billing_period:
          type: string
          nullable: true
        status:
          type: string
          nullable: true
        access_status:
          type: string
          nullable: true
        current_period_end:
          type: string
          nullable: true
        cancel_at_period_end:
          type: boolean
          nullable: true
    AccountMembershipAccessState:
      type: string
      enum:
        - free
        - active
        - inactive
        - unknown
    AccountCreditsSummary:
      type: object
      additionalProperties: false
      required:
        - available_credits
      properties:
        available_credits:
          type: string
          nullable: true
        expiring_credits_within_24h:
          type: string
          nullable: true
        next_expire_at:
          type: string
          nullable: true
        refreshed_at:
          type: string
          nullable: true
    AccountProductSummaryLinks:
      type: object
      additionalProperties: false
      required:
        - plan_url
        - usage_url
        - settings_url
      properties:
        plan_url:
          type: string
          minLength: 1
        usage_url:
          type: string
          minLength: 1
        settings_url:
          type: string
          minLength: 1
    AccountProductSummaryPartialError:
      type: object
      additionalProperties: false
      required:
        - scope
        - code
      properties:
        scope:
          type: string
          enum:
            - membership
            - credits
            - links
            - unknown
        code:
          type: string
          minLength: 1
        message:
          type: string
          nullable: true
    AccountRegistrationCreditsReward:
      type: object
      additionalProperties: false
      required:
        - id
        - grant_no
        - credits
        - created_at
      properties:
        id:
          type: string
          minLength: 1
        grant_no:
          type: string
          minLength: 1
        credits:
          type: integer
          format: int64
          minimum: 1
        created_at:
          type: string
          minLength: 1
    AccountProductSummaryResponse:
      type: object
      additionalProperties: false
      required:
        - user
        - membership
        - membership_access
        - credits
        - links
      properties:
        user:
          allOf:
            - $ref: "#/components/schemas/AccountUserInfo"
          nullable: true
        membership:
          allOf:
            - $ref: "#/components/schemas/AccountMembershipSummary"
          nullable: true
        membership_access:
          $ref: "#/components/schemas/AccountMembershipAccessState"
        credits:
          allOf:
            - $ref: "#/components/schemas/AccountCreditsSummary"
          nullable: true
        partial_error:
          allOf:
            - $ref: "#/components/schemas/AccountProductSummaryPartialError"
          nullable: true
        registration_credits_reward:
          allOf:
            - $ref: "#/components/schemas/AccountRegistrationCreditsReward"
          nullable: true
        links:
          $ref: "#/components/schemas/AccountProductSummaryLinks"
    DismissAccountRegistrationCreditsRewardRequest:
      type: object
      additionalProperties: false
      required:
        - reward_id
      properties:
        reward_id:
          type: string
          minLength: 1
    AccountLoginStartResponse:
      type: object
      additionalProperties: false
      required:
        - attempt_id
        - login_url
        - expires_at
      properties:
        attempt_id:
          type: string
          minLength: 1
        login_url:
          type: string
          minLength: 1
        expires_at:
          type: integer
          format: int64
    AccountLoginStatusValue:
      type: string
      enum:
        - pending
        - completed
        - failed
        - expired
    AccountLoginStatusResponse:
      type: object
      additionalProperties: false
      required:
        - attempt_id
        - status
        - expires_at
      properties:
        attempt_id:
          type: string
          minLength: 1
        status:
          $ref: "#/components/schemas/AccountLoginStatusValue"
        expires_at:
          type: integer
          format: int64
        error:
          type: string
          nullable: true
        user:
          allOf:
            - $ref: "#/components/schemas/AccountUserInfo"
          nullable: true
    CliOutputMode:
      type: string
      enum:
        - table
        - json
        - plain
        - markdown
    CliTableColumn:
      type: object
      description: Machine-readable table column metadata for clients that render command output.
      additionalProperties: false
      required:
        - key
        - label
      properties:
        key:
          type: string
          minLength: 1
        label:
          type: string
          description: Human-readable fallback label supplied by the protocol for terminal rendering.
          minLength: 1
    CliTableOutput:
      type: object
      additionalProperties: false
      required:
        - columns
      properties:
        columns:
          type: array
          items:
            $ref: "#/components/schemas/CliTableColumn"
    CliCapabilityOutput:
      type: object
      additionalProperties: false
      required:
        - defaultMode
        - json
      properties:
        defaultMode:
          $ref: "#/components/schemas/CliOutputMode"
        json:
          type: boolean
        table:
          allOf:
            - $ref: "#/components/schemas/CliTableOutput"
          nullable: true
    CliCommandExecutionMode:
      type: string
      enum:
        - wait
    CliCommandExecution:
      type: object
      description: Optional client-side execution behavior declared by a command. Wait commands remain active while handlers return a pending continuation.
      additionalProperties: false
      required:
        - mode
      properties:
        mode:
          $ref: "#/components/schemas/CliCommandExecutionMode"
    CliCapabilitySourceKind:
      type: string
      enum:
        - builtin
        - app
    CliCapabilitySource:
      type: object
      additionalProperties: false
      required:
        - kind
      properties:
        kind:
          $ref: "#/components/schemas/CliCapabilitySourceKind"
        appId:
          type: string
          nullable: true
        appName:
          type: string
          nullable: true
        iconUrl:
          type: string
          description: App manifest icon data URL for app-sourced commands.
          nullable: true
        cliDescription:
          type: string
          description: CLI scope description for app-sourced commands.
          nullable: true
        appDescription:
          type: string
          description: App manifest description for app-sourced commands.
          nullable: true
        documentationFile:
          type: string
          description: Package-local command documentation file declared by the app CLI manifest.
          nullable: true
        documentationPath:
          type: string
          description: Absolute command documentation path resolved from the installed app package.
          nullable: true
    CliCapabilityVisibility:
      type: string
      enum:
        - public
        - integration
    CliCapability:
      type: object
      description: Stable command metadata exposed by the local CLI capability protocol.
      additionalProperties: false
      required:
        - id
        - path
        - summary
        - output
        - source
      properties:
        id:
          type: string
          description: Stable command identifier used by invoke routes.
          minLength: 1
        path:
          type: array
          description: Terminal command path segments, excluding the tutti binary name.
          minItems: 1
          items:
            type: string
            minLength: 1
        summary:
          type: string
          description: Short human-readable summary for help surfaces.
          minLength: 1
        description:
          type: string
          description: Optional longer human-readable command description.
          nullable: true
        visibility:
          $ref: "#/components/schemas/CliCapabilityVisibility"
          description: Command discovery visibility. Public commands are user-facing; integration commands are app-runtime plumbing and should not be exposed as ordinary user or Agent actions.
        inputSchema:
          type: object
          description: Optional JSON Schema fragment describing accepted command input.
          additionalProperties: true
          nullable: true
        output:
          $ref: "#/components/schemas/CliCapabilityOutput"
        execution:
          allOf:
            - $ref: "#/components/schemas/CliCommandExecution"
          nullable: true
        handlerTimeoutMs:
          type: integer
          description: Per-invocation App handler timeout used by clients to budget the daemon request.
          minimum: 1000
          maximum: 600000
          nullable: true
        source:
          $ref: "#/components/schemas/CliCapabilitySource"
    CliCapabilitiesResponse:
      type: object
      additionalProperties: false
      required:
        - commands
      properties:
        commands:
          type: array
          items:
            $ref: "#/components/schemas/CliCapability"
    CliInvokeContext:
      type: object
      description: Client-supplied invocation context. These fields are hints for routing and audit only; authorization and workspace validation remain daemon-owned.
      additionalProperties: false
      required:
        - source
      properties:
        source:
          type: string
          description: Client source label such as cli. This is not an authorization boundary.
          minLength: 1
        appId:
          type: string
          description: Calling workspace app id hint. Managed-model commands validate it against their grant binding.
          nullable: true
        workspaceID:
          type: string
          nullable: true
        parentCommandId:
          type: string
          nullable: true
        agentSessionId:
          type: string
          description: Caller agent session id hint. This is not an authorization boundary.
          nullable: true
    CliInvokeRequest:
      type: object
      additionalProperties: false
      properties:
        input:
          type: object
          additionalProperties: true
          nullable: true
        outputMode:
          allOf:
            - $ref: "#/components/schemas/CliOutputMode"
          nullable: true
        context:
          allOf:
            - $ref: "#/components/schemas/CliInvokeContext"
          nullable: true
    CliCommandOutput:
      type: object
      additionalProperties: false
      required:
        - kind
      properties:
        kind:
          $ref: "#/components/schemas/CliOutputMode"
        columns:
          type: array
          items:
            $ref: "#/components/schemas/CliTableColumn"
        rows:
          type: array
          items:
            type: object
            additionalProperties: true
        value:
          type: object
          additionalProperties: true
          nullable: true
        text:
          type: string
          nullable: true
        warnings:
          type: array
          items:
            $ref: "#/components/schemas/CliCommandWarning"
        continuation:
          allOf:
            - $ref: "#/components/schemas/CliCommandContinuation"
          nullable: true
    CliCommandContinuationState:
      type: string
      enum:
        - pending
    CliCommandContinuation:
      type: object
      description: Internal continuation signal consumed by the CLI for wait commands and not rendered as a terminal result.
      additionalProperties: false
      required:
        - state
        - retryAfterMs
      properties:
        state:
          $ref: "#/components/schemas/CliCommandContinuationState"
        retryAfterMs:
          type: integer
          description: Delay before the CLI invokes the same command again.
          minimum: 250
          maximum: 60000
    CliCommandWarning:
      type: object
      additionalProperties: false
      required:
        - code
        - message
      properties:
        code:
          type: string
        message:
          type: string
    CliInvokeResponse:
      type: object
      additionalProperties: false
      required:
        - ok
      properties:
        ok:
          type: boolean
        output:
          allOf:
            - $ref: "#/components/schemas/CliCommandOutput"
          nullable: true
    WorkspaceAppMentionCandidateSource:
      type: string
      enum:
        - workspace_app
        - cli_app
    WorkspaceAppMentionCliMetadata:
      type: object
      additionalProperties: false
      required:
        - commandCount
        - commandDescriptions
        - commandPaths
        - commandSummaries
        - scopes
      properties:
        commandCount:
          type: integer
          minimum: 0
        commandDescriptions:
          type: array
          items:
            type: string
        commandPaths:
          type: array
          items:
            type: string
        commandSummaries:
          type: array
          items:
            type: string
        scopes:
          type: array
          items:
            type: string
    WorkspaceAppMentionCandidate:
      type: object
      additionalProperties: false
      required:
        - appId
        - displayName
        - description
        - iconUrl
        - availableIconUrl
        - installed
        - enabled
        - source
        - localizations
        - references
        - cli
      properties:
        appId:
          type: string
          minLength: 1
        displayName:
          type: string
          minLength: 1
        description:
          type: string
        iconUrl:
          type: string
          nullable: true
        availableIconUrl:
          type: string
          nullable: true
        installed:
          type: boolean
        enabled:
          type: boolean
        source:
          $ref: "#/components/schemas/WorkspaceAppMentionCandidateSource"
        localizations:
          type: array
          items:
            $ref: "#/components/schemas/WorkspaceAppLocalization"
        references:
          $ref: "#/components/schemas/WorkspaceAppReferencesState"
        cli:
          $ref: "#/components/schemas/WorkspaceAppMentionCliMetadata"
    WorkspaceAppMentionCandidatesResponse:
      type: object
      additionalProperties: false
      required:
        - workspaceId
        - apps
      properties:
        workspaceId:
          type: string
          minLength: 1
        apps:
          type: array
          items:
            $ref: "#/components/schemas/WorkspaceAppMentionCandidate"
    ApiErrorDetails:
      type: object
      additionalProperties: false
      required:
        - code
      properties:
        code:
          type: string
          enum:
            - invalid_request
            - method_not_allowed
            - unauthorized
            - service_unavailable
            - workspace_not_found
            - workspace_file_not_found
            - workspace_issue_resource_exists
            - workspace_terminal_not_found
            - workspace_app_not_found
            - workspace_issue_resource_not_found
            - workspace_operation_failed
            - preferences_operation_failed
            - agent_quick_prompt_not_found
            - agent_quick_prompt_conflict
            - agent_quick_prompt_operation_failed
            - agent_target_not_found
            - model_plan_not_found
            - model_plan_referenced
            - model_policy_referenced
            - workspace_agent_not_found
            - collaboration_run_not_found
            - automation_rule_not_found
        reason:
          type: string
        params:
          type: object
          additionalProperties: true
        retryable:
          type: boolean
        developerMessage:
          type: string
        correlationId:
          type: string
    ApiErrorResponse:
      type: object
      additionalProperties: false
      required:
        - error
      properties:
        error:
          $ref: "#/components/schemas/ApiErrorDetails"
    WorkspaceSummary:
      type: object
