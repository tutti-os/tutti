        these booleans instead of provider identity. Field names mirror the
        canonical capability keys in
        packages/agent/daemon/runtime/capabilities.go.
      additionalProperties: false
      required:
        - imageInput
        - modelImageInputRequired
        - modelSwitch
        - modelPlanBinding
        - skills
        - compact
        - tokenUsage
        - rateLimits
        - planMode
        - interrupt
        - activeTurnGuidance
        - browserUse
        - computerUse
        - goalPause
        - planImplementation
        - permissionModeChangeDuringTurn
        - permissionModeChangeDeferred
        - review
        - resumeRunningTurn
      properties:
        imageInput:
          type: boolean
        modelImageInputRequired:
          type: boolean
        modelSwitch:
          type: boolean
          description: >-
            The provider can apply a model change to the next call in the
            current session.
        modelPlanBinding:
          type: boolean
          description: >-
            The provider runtime accepts a session-scoped model access plan
            endpoint and credential.
        skills:
          type: boolean
        compact:
          type: boolean
        tokenUsage:
          type: boolean
        rateLimits:
          type: boolean
        planMode:
          type: boolean
        interrupt:
          type: boolean
        activeTurnGuidance:
          type: boolean
          description: >-
            The provider can accept a user prompt as guidance for the currently
            running turn without canceling it or creating a normal next turn.
        browserUse:
          type: boolean
        computerUse:
          type: boolean
        goalPause:
          type: boolean
        planImplementation:
          type: boolean
        permissionModeChangeDuringTurn:
          type: boolean
        permissionModeChangeDeferred:
          type: boolean
        review:
          type: boolean
        resumeRunningTurn:
