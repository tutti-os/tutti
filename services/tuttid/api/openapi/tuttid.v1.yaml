    WorkspaceAgentSessionMessage:
      type: object
      additionalProperties: false
      required:
        - agentSessionId
        - messageId
        - sequence
        - turnId
        - role
        - kind
        - occurredAtUnixMs
        - version
      properties:
        agentSessionId:
          type: string
          minLength: 1
        messageId:
          type: string
          minLength: 1
        sequence:
          type: integer
          format: int64
          minimum: 1
          description: >-
            Stable message presentation order assigned when the durable message
            row is first created. Updating the same message does not change this
            value; version remains the mutable snapshot change cursor.
        turnId:
          type: string
          nullable: true
          description: >-
            A non-empty turnId attaches a Turn-scoped message to a real
            persisted Turn. Null is valid only when kind is session_audit;
            empty strings are forbidden. Legacy stored turnless rows are read
            as compatibility data and are never assigned a guessed Turn.
        role:
          type: string
          minLength: 1
        kind:
          type: string
          minLength: 1
          description: >-
            session_audit is the only session-scoped kind; every other kind is
            Turn-scoped and requires a non-null turnId.
        status:
          type: string
        semantics:
          $ref: "#/components/schemas/AgentActivityMessageSemantics"
        payload:
          type: object
          additionalProperties: true
        occurredAtUnixMs:
          type: integer
          format: int64
          minimum: 1
        startedAtUnixMs:
          type: integer
          format: int64
        completedAtUnixMs:
          type: integer
          format: int64
        createdAtUnixMs:
          type: integer
          format: int64
        updatedAtUnixMs:
          type: integer
          format: int64
        version:
          type: integer
          format: int64
          minimum: 0
