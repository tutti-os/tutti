      - $ref: "#/components/parameters/WorkspaceID"
      - $ref: "#/components/parameters/AgentSessionID"
    get:
      operationId: getAgentSessionAutomationRuleOverride
      tags:
        - automation-rule
      summary: Get the session-level automation rule override
      description: An absent override returns disabled=false and an empty rule id list.
      responses:
        "200":
          description: Session automation rule override
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentSessionAutomationRuleOverride"
        "400":
          $ref: "#/components/responses/InvalidRequestError"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "405":
          $ref: "#/components/responses/MethodNotAllowedError"
        "502":
          $ref: "#/components/responses/WorkspaceOperationError"
        "503":
          $ref: "#/components/responses/ServiceUnavailableError"
    put:
      operationId: setAgentSessionAutomationRuleOverride
      tags:
        - automation-rule
      summary: Disable or select automation rules for one session
      description: Disabled stops every future rule evaluation for this session. A non-empty ruleIds list replaces the workspace rule set for this session; an empty list uses all enabled workspace rules. Already-started actions are unchanged.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SetAgentSessionAutomationRuleOverrideRequest"
      responses:
        "200":
          description: Updated session automation rule override
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentSessionAutomationRuleOverride"
        "400":
          $ref: "#/components/responses/InvalidRequestError"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
