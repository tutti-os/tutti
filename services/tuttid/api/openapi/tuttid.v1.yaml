          items:
            type: string
            minLength: 1
    WorkspaceAgent:
      type: object
      additionalProperties: false
      description: A selectable, workspace-scoped Agent made from one Harness target plus an optional model access plan and Agent-specific behavior configuration.
      required:
        - id
        - agentTargetId
        - workspaceId
        - name
        - description
        - harness
        - modelFallbacks
        - instructions
        - callConditions
        - capabilitiesExplicit
        - skills
        - tools
        - source
        - revision
        - createdAt
        - updatedAt
      properties:
        id:
          type: string
          minLength: 1
          description: Opaque Agent option id. New ids use the workspace-agent prefix and may be passed to workspace Agent session APIs.
        agentTargetId:
          type: string
          minLength: 1
          description: Compatibility alias of id for AgentGUI and session creation surfaces.
        workspaceId:
          type: string
          minLength: 1
        name:
          type: string
          minLength: 1
        description:
          description: Short human-readable description shown with the Agent in directories and cards.
          type: string
        harness:
          $ref: "#/components/schemas/WorkspaceAgentHarness"
        modelPlanId:
          type: string
          nullable: true
        defaultModel:
          type: string
          nullable: true
        modelFallbacks:
          type: array
          description: Dormant contract field without an editor surface. Ordered, explicit fallback chain used only when starting a new session and the primary Plan/model is not usable. Credentials remain daemon-owned.
          items:
            $ref: "#/components/schemas/WorkspaceAgentModelRef"
        instructions:
          type: string
        callConditions:
          type: array
          description: Explicit, user-editable conditions that explain when another Agent or user should invoke this Agent.
          items:
            type: string
            minLength: 1
        capabilitiesExplicit:
          type: boolean
          description: >-
            Dormant contract field without an editor surface. False keeps
            Skills and tools synchronized with all capabilities compatible
            with the selected Harness. True makes the Skills and tools arrays
            an explicit allowlist; empty arrays then mean none.
        skills:
          type: array
          items:
            type: string
            minLength: 1
        tools:
          type: array
          items:
            type: string
            minLength: 1
        source:
          $ref: "#/components/schemas/WorkspaceAgentSource"
        revision:
          type: integer
          format: int64
          minimum: 1
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
