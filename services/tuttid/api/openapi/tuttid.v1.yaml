        "405":
          $ref: "#/components/responses/MethodNotAllowedError"
        "502":
          $ref: "#/components/responses/WorkspaceOperationError"
        "503":
          $ref: "#/components/responses/ServiceUnavailableError"
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
  parameters:
    CliCommandID:
      name: commandID
      in: path
      required: true
      schema:
        type: string
        minLength: 1
    WorkspaceID:
      name: workspaceID
      in: path
      required: true
      schema:
        type: string
        minLength: 1
    WorkspaceAppID:
      name: appID
      in: path
      required: true
      schema:
        type: string
        minLength: 1
    WorkspaceAppFactoryJobID:
      name: jobID
      in: path
      required: true
      schema:
        type: string
        minLength: 1
    ModelPlanID:
      name: modelPlanID
      in: path
      required: true
      schema:
        type: string
        minLength: 1
    WorkspaceAgentID:
      name: workspaceAgentID
      in: path
      required: true
      schema:
        type: string
        minLength: 1
    ModelPolicyID:
      name: modelPolicyID
      in: path
      required: true
      schema:
        type: string
        minLength: 1
    CollaborationRunID:
      name: collaborationRunID
      in: path
      required: true
      schema:
        type: string
        minLength: 1
    WorkspaceFilePath:
      name: path
      in: query
      description: Omit to resolve the current workspace file root.
      required: false
      schema:
        type: string
        minLength: 1
    WorkspaceFileIncludeHidden:
      name: includeHidden
      in: query
      required: false
      schema:
        type: boolean
        default: false
    WorkspaceFilePrefetchDepth:
      name: prefetchDepth
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 8
        default: 4
    WorkspaceFilePrefetchBudgetMs:
      name: prefetchBudgetMs
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 5000
        default: 500
    WorkspaceFileSearchQuery:
      name: query
      in: query
      required: true
      schema:
        type: string
    WorkspaceFileSearchWithin:
      name: within
      in: query
      required: false
      description: >-
        可选:把搜索限定在工作区根下的某子路径(对应左栏选中的「位置」,如
        文稿/下载/桌面)。相对工作区根的逻辑路径;缺省/空 = 跨整根搜索。
      schema:
        type: string
        minLength: 1
    WorkspaceFileSearchLimit:
      name: limit
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 200
        default: 30
    WorkspaceFileRecentLimit:
      name: limit
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 30
    WorkspaceFileSearchKinds:
      name: includeKinds
      in: query
      required: false
      style: form
      explode: true
      schema:
        type: array
        items:
          $ref: "#/components/schemas/WorkspaceFileFilterKind"
    WorkspaceFileSearchFilters:
      name: filters
      in: query
      required: false
      style: form
      explode: true
      description: >-
        已选「文件类型筛选分类」id(全局统一口径:image/video/document/
        webpage/other)。筛选与搜索是同一能力:query 可空、filters
        非空时即按类型 list-all。空/缺省 = 不按类型过滤。
      schema:
        type: array
        items:
          type: string
    TerminalID:
      name: terminalID
      in: path
      required: true
