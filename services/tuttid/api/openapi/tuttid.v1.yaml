    TuttiModeActivationStatus:
      type: string
      enum:
        - active
        - inactive
    TuttiModeActivationSource:
      type: string
      description: User-visible interaction that created this activation revision.
      enum:
        - slash_command
        - badge_remove
    TuttiModeActivationRevision:
      type: object
      additionalProperties: false
      required:
        - id
        - activationId
        - revision
        - status
        - source
        - orchestrationIntensity
        - createdAtUnixMs
      properties:
        id:
          type: string
          format: uuid
        activationId:
          type: string
          format: uuid
        revision:
          type: integer
          format: int64
          minimum: 1
        status:
          $ref: "#/components/schemas/TuttiModeActivationStatus"
        source:
          $ref: "#/components/schemas/TuttiModeActivationSource"
        orchestrationIntensity:
          type: integer
          minimum: 0
          maximum: 100
          description: >-
            Session-scoped orchestration intensity captured with this
            activation revision. Higher values ask the planning agent for
            finer-grained task decomposition.
        createdAtUnixMs:
          type: integer
          format: int64
          minimum: 0
    TuttiModeActivation:
      type: object
      additionalProperties: false
      required:
        - id
        - workspaceId
        - agentSessionId
        - status
        - currentRevision
        - createdAtUnixMs
        - updatedAtUnixMs
      properties:
        id:
          type: string
          format: uuid
        workspaceId:
          type: string
          minLength: 1
        agentSessionId:
          type: string
          minLength: 1
        status:
          $ref: "#/components/schemas/TuttiModeActivationStatus"
        currentRevision:
          $ref: "#/components/schemas/TuttiModeActivationRevision"
        createdAtUnixMs:
          type: integer
          format: int64
          minimum: 0
        updatedAtUnixMs:
          type: integer
          format: int64
          minimum: 0
    TuttiModeActivationIntent:
      type: object
      additionalProperties: false
      required:
        - status
        - source
      properties:
        status:
          $ref: "#/components/schemas/TuttiModeActivationStatus"
        source:
          $ref: "#/components/schemas/TuttiModeActivationSource"
        orchestrationIntensity:
          type: integer
          nullable: true
          minimum: 0
          maximum: 100
          description: >-
            Optional orchestration intensity carried with the initial
            activation. Omitted uses the daemon default.
    TuttiModeActivationResponse:
      type: object
      additionalProperties: false
      required:
        - activation
      properties:
        activation:
          allOf:
            - $ref: "#/components/schemas/TuttiModeActivation"
          nullable: true
          description: Null until the session has its first Tutti mode activation revision.
    UpdateTuttiModeActivationRequest:
      type: object
      additionalProperties: false
      required:
        - status
        - source
      properties:
        status:
          $ref: "#/components/schemas/TuttiModeActivationStatus"
        source:
          $ref: "#/components/schemas/TuttiModeActivationSource"
        orchestrationIntensity:
          type: integer
          nullable: true
          minimum: 0
          maximum: 100
          description: >-
            Optional orchestration intensity persisted with the appended
            activation revision. Omitted keeps the current value, or the
            daemon default for the first revision.
        expectedRevision:
          type: integer
          format: int64
          nullable: true
          minimum: 0
          description: Optional optimistic-concurrency guard. Zero means no activation revision exists yet.
    UpdateTuttiModeActivationResponse:
      type: object
      additionalProperties: false
      required:
        - activation
        - changed
      properties:
        activation:
          allOf:
            - $ref: "#/components/schemas/TuttiModeActivation"
          nullable: true
        changed:
          type: boolean
          description: False for an idempotent update that did not create a new revision.
    WorkspaceAgentSessionKind:
      type: string
      description: >-
        Root sessions are user-visible conversations. Child sessions are
        provider-native agents reached through their immutable parent fields.
      enum:
        - root
        - child
    WorkspaceAgentSession:
      type: object
      additionalProperties: false
      required:
        - id
        - kind
        - rootAgentSessionId
        - rootTurnId
        - parentAgentSessionId
        - parentTurnId
        - parentToolCallId
        - agentTargetId
        - provider
        - providerSessionId
        - cwd
        - railSectionKey
        - visible
        - settings
        - permissionConfig
        - resumable
        - pinnedAtUnixMs
        - title
        - createdAtUnixMs
        - updatedAtUnixMs
        - endedAtUnixMs
        - latestTurnInteractions
        - activeTurnId
        - activeTurn
        - latestTurn
        - pendingInteractions
        - capabilities
        - usage
        - goal
        - tuttiModeActivation
        - imported
      properties:
        id:
          type: string
          minLength: 1
        kind:
          $ref: "#/components/schemas/WorkspaceAgentSessionKind"
        rootAgentSessionId:
          type: string
          nullable: true
          minLength: 1
          description: >-
            Root session that owns this child session. Null when kind is root.
        rootTurnId:
          type: string
          nullable: true
          minLength: 1
          description: >-
            Root turn under which this child session was created. Null when
            kind is root.
        parentAgentSessionId:
          type: string
          nullable: true
          minLength: 1
          description: >-
            Direct parent session that created this child session. Null when
            kind is root.
        parentTurnId:
          type: string
          nullable: true
          minLength: 1
          description: >-
            Exact turn in the direct parent session that created this child
            session. Null when kind is root.
        parentToolCallId:
          type: string
          nullable: true
          minLength: 1
          description: >-
            Delegation tool call in the parent turn that created this child
            session. Null when kind is root.
        agentTargetId:
          type: string
          nullable: true
          description: Agent target that authorized this session launch. Historical or imported provider-only sessions may omit it.
        provider:
          $ref: "#/components/schemas/WorkspaceAgentProvider"
        providerSessionId:
          type: string
          nullable: true
        cwd:
          type: string
          nullable: true
        railSectionKey:
          type: string
          minLength: 1
          description: >-
            Persisted conversation-rail membership key. Clients must use this
            exact key for section placement and must not infer membership from
            cwd or project paths.
        activeTurnId:
          type: string
          nullable: true
          description: >-
            Protocol v2. The only turn reference kept on the session; null
            when no turn is in flight.
        activeTurn:
          allOf:
            - $ref: "#/components/schemas/WorkspaceAgentTurn"
          nullable: true
          description: >-
            Protocol v2. Embedded snapshot of the active turn; null when no
            turn is in flight.
        latestTurn:
          allOf:
            - $ref: "#/components/schemas/WorkspaceAgentTurn"
          nullable: true
          description: >-
            Protocol v2. Read-only embedded projection of the most recently
            updated turn for this session, including settled turns. This is
            an independent turn entity projection and is not session-owned
            persistent state or a session reference.
        latestTurnInteractions:
          type: array
          description: >-
            Protocol v2. Read-only independent Interaction entity projections
            for latestTurn, including pending, answered, and superseded
            terminal states. These entities are not session-owned persistent
            state.
          items:
            $ref: "#/components/schemas/WorkspaceAgentInteraction"
        pendingInteractions:
          type: array
          description: >-
            Protocol v2. Pending interactions (approvals, questions, plan
            confirmations) for the active turn. Pending means present in this
            collection with status pending; there is no tri-state null
            protocol.
          items:
            $ref: "#/components/schemas/WorkspaceAgentInteraction"
        capabilities:
          allOf:
            - $ref: "#/components/schemas/WorkspaceAgentCapabilities"
          nullable: true
          description: >-
            Protocol v2. Daemon-issued capability descriptor; clients must
            branch on capabilities, never on provider identity.
        usage:
          allOf:
            - $ref: "#/components/schemas/WorkspaceAgentUsage"
          nullable: true
          description: >-
            Protocol v2. Typed context-window and quota usage projected from
            provider runtime state.
        goal:
          allOf:
            - $ref: "#/components/schemas/WorkspaceAgentSessionGoal"
          nullable: true
          description: Protocol v2. Explicit field extracted from runtimeContext.
        tuttiModeActivation:
          allOf:
            - $ref: "#/components/schemas/TuttiModeActivation"
          nullable: true
          description: >-
            Independent, session-scoped Tutti mode activation projection. Null
            until the first activation revision exists; capability references
            are audit records and never determine this state.
        imported:
          type: boolean
          description: >-
            Protocol v2. True when the session was imported from external
            provider history. Explicit field extracted from runtimeContext.
        visible:
          type: boolean
        settings:
          $ref: "#/components/schemas/AgentSessionComposerSettings"
        permissionConfig:
          $ref: "#/components/schemas/PermissionConfig"
        resumable:
          type: boolean
        pinnedAtUnixMs:
          type: integer
          format: int64
          nullable: true
          minimum: 0
        title:
          type: string
          nullable: true
        createdAtUnixMs:
          type: integer
          format: int64
          minimum: 0
          description: Protocol v2. Unix milliseconds replacement for createdAt.
        updatedAtUnixMs:
          type: integer
          format: int64
          minimum: 0
          description: Protocol v2. Unix milliseconds replacement for updatedAt.
        endedAtUnixMs:
          type: integer
          format: int64
          nullable: true
          minimum: 0
          description: Protocol v2. Unix milliseconds replacement for endedAt.
    WorkspaceAgentSessionResponse:
      type: object
      additionalProperties: false
      required:
        - session
      properties:
        session:
          $ref: "#/components/schemas/WorkspaceAgentSession"
    WorkspaceAgentSessionDetailResponse:
      type: object
      additionalProperties: false
      required:
        - session
        - childSessions
        - turns
      properties:
        session:
          $ref: "#/components/schemas/WorkspaceAgentSession"
        childSessions:
          type: array
          description: >-
            Flat collection of every nested child session below session.
            Clients reconstruct the tree from the immutable parent fields.
          items:
            $ref: "#/components/schemas/WorkspaceAgentSession"
        turns:
          type: array
          description: >-
            Ordered durable turns owned by session. This detail-only collection
            is the canonical source for turn-scoped history such as file changes;
            clients must not reconstruct it from provider tool payloads.
          items:
            $ref: "#/components/schemas/WorkspaceAgentTurn"
    SendWorkspaceAgentSessionInputResponse:
      oneOf:
        - $ref: "#/components/schemas/SendWorkspaceAgentSessionInputTurnResponse"
        - $ref: "#/components/schemas/SendWorkspaceAgentSessionInputGoalControlResponse"
      discriminator:
        propertyName: kind
        mapping:
          turn: "#/components/schemas/SendWorkspaceAgentSessionInputTurnResponse"
          goalControl: "#/components/schemas/SendWorkspaceAgentSessionInputGoalControlResponse"
    SendWorkspaceAgentSessionInputTurnResponse:
      type: object
      additionalProperties: false
      required:
        - session
        - kind
        - turnId
        - turn
      properties:
        session:
          $ref: "#/components/schemas/WorkspaceAgentSession"
        kind:
          type: string
          enum:
            - turn
          x-enum-varnames:
            - SendWorkspaceAgentSessionInputTurnResponseKindTurn
        turnId:
          type: string
          minLength: 1
        turn:
          $ref: "#/components/schemas/WorkspaceAgentTurn"
          description: >-
            Protocol v2. Durable snapshot of the exact turn accepted by this
            submission; optimistic client intents reconcile against its turnId.
    SendWorkspaceAgentSessionInputGoalControlResponse:
      type: object
      additionalProperties: false
      required:
        - session
        - kind
      properties:
        session:
          $ref: "#/components/schemas/WorkspaceAgentSession"
        kind:
          type: string
          enum:
            - goalControl
          x-enum-varnames:
            - SendWorkspaceAgentSessionInputGoalControlResponseKindGoalControl
        operationId:
          type: string
          nullable: true
          description: Durable GoalControlOperation identity when kind is goalControl.
        goal:
          allOf:
            - $ref: "#/components/schemas/WorkspaceAgentSessionGoal"
          nullable: true
        goalState:
          allOf:
            - $ref: "#/components/schemas/WorkspaceAgentSessionGoalState"
          nullable: true
    WorkspaceAgentTurnPhase:
      type: string
      description: >-
        Protocol v2 closed turn phase vocabulary. submitted -> running ->
        waiting (interactions) -> settling -> settled.
      enum:
        - submitted
        - running
        - waiting
        - settling
        - settled
    WorkspaceAgentTurnOutcome:
      type: string
      description: >-
        Protocol v2 closed turn outcome vocabulary; only present once the
        turn is settled. interrupted marks turns reconciled at daemon
        startup after the provider process disappeared.
      enum:
        - completed
        - failed
        - canceled
        - interrupted
    WorkspaceAgentTurnError:
      type: object
      description: Protocol v2 turn-scoped error; never pollutes session state.
      additionalProperties: false
      required:
        - message
      properties:
        message:
          type: string
          minLength: 1
        code:
          type: string
    WorkspaceAgentCapabilityReference:
      type: object
      description: >-
        A structured user-submission reference to a daemon-owned capability.
        This is provenance for UI and durable workflow linkage; it is not
        injected into provider prompt text and does not gate CLI availability.
      additionalProperties: false
      required:
        - capability
        - source
      properties:
        capability:
          type: string
          enum:
            - tutti
        source:
          type: string
          enum:
            - slash_command
    WorkspaceAgentCompletedCommand:
      type: object
      description: >-
        Protocol v2 closed-enum replacement for AgentActivityCompletedCommand.
      additionalProperties: false
      required:
        - kind
        - status
      properties:
        kind:
          type: string
          enum:
            - compact
            - review
            - undo
            - goal
        status:
          type: string
          enum:
            - completed
            - failed
            - canceled
    WorkspaceAgentTurn:
      type: object
      description: >-
        Protocol v2 turn entity. One user-submission-driven execution:
        submit, run, wait, settle. Owns phase, outcome, error, and file
        changes; the session only keeps an activeTurnId reference.
      additionalProperties: false
      required:
        - turnId
        - agentSessionId
        - phase
        - origin
        - outcome
        - error
        - fileChanges
        - completedCommand
        - startedAtUnixMs
        - settledAtUnixMs
        - updatedAtUnixMs
      properties:
        turnId:
          type: string
          minLength: 1
        agentSessionId:
          type: string
          minLength: 1
        phase:
          $ref: "#/components/schemas/WorkspaceAgentTurnPhase"
        origin:
          type: string
          description: Durable business provenance; steer is input on an existing turn and is never an origin.
          enum:
            - user_prompt
            - goal_arm
            - goal_continuation
            - provider_initiated
            - legacy_unknown
        sourceGoalOperationId:
          type: string
          nullable: true
          minLength: 1
        sourceGoalRevision:
          type: integer
          format: int64
          nullable: true
          minimum: 0
        sourceGoalRepairEpoch:
          type: integer
          format: int64
          nullable: true
          minimum: 0
        outcome:
          allOf:
            - $ref: "#/components/schemas/WorkspaceAgentTurnOutcome"
          nullable: true
        error:
          allOf:
            - $ref: "#/components/schemas/WorkspaceAgentTurnError"
          nullable: true
        fileChanges:
          type: object
          additionalProperties: true
          nullable: true
        completedCommand:
          allOf:
            - $ref: "#/components/schemas/WorkspaceAgentCompletedCommand"
          nullable: true
        capabilityRefs:
          type: array
          uniqueItems: true
          items:
            $ref: "#/components/schemas/WorkspaceAgentCapabilityReference"
        startedAtUnixMs:
          type: integer
          format: int64
          minimum: 0
        settledAtUnixMs:
          type: integer
          format: int64
          nullable: true
          minimum: 0
        updatedAtUnixMs:
          type: integer
          format: int64
          minimum: 0
    WorkspaceAgentInteractionKind:
      type: string
      enum:
        - approval
        - question
        - plan
    WorkspaceAgentInteractionStatus:
      type: string
      enum:
        - pending
        - answered
        - superseded
    WorkspaceAgentInteraction:
      type: object
      description: >-
        Protocol v2 interaction entity. An agent-initiated approval,
        question, or plan confirmation raised during a turn. Pending means
        present in a collection with status pending; replaces the tri-state
        null pendingInteractive protocol.
      additionalProperties: false
      required:
        - requestId
        - agentSessionId
        - turnId
        - kind
        - status
        - toolName
        - input
        - output
        - metadata
        - createdAtUnixMs
        - updatedAtUnixMs
      properties:
        requestId:
          type: string
          minLength: 1
        agentSessionId:
          type: string
          minLength: 1
        turnId:
          type: string
          minLength: 1
        kind:
          $ref: "#/components/schemas/WorkspaceAgentInteractionKind"
        status:
          $ref: "#/components/schemas/WorkspaceAgentInteractionStatus"
        toolName:
          type: string
          nullable: true
        input:
          type: object
          additionalProperties: true
          nullable: true
        output:
          type: object
          additionalProperties: true
          nullable: true
        metadata:
          type: object
          additionalProperties: true
          nullable: true
        createdAtUnixMs:
          type: integer
          format: int64
          minimum: 0
        updatedAtUnixMs:
          type: integer
          format: int64
          minimum: 0
    WorkspaceAgentCapabilities:
      type: object
