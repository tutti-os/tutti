name: PR Checks

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - edited
    branches:
      - main

concurrency:
  group: pr-checks-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  ci-skip:
    name: CI Skip Request
    runs-on: ubuntu-latest
    outputs:
      skip: ${{ steps.detect.outputs.skip }}

    steps:
      - name: Detect temporary CI skip checkbox
        id: detect
        uses: actions/github-script@v7
        with:
          script: |
            const body = context.payload.pull_request?.body ?? "";
            const skip = /-\s*\[[xX]\]\s*Temporarily skip CI checks for this PR\./.test(body);
            core.setOutput("skip", skip ? "true" : "false");

            if (skip) {
              core.warning("CI checks were temporarily skipped from the pull request checklist.");
            }

  tooling-consistency:
    name: Tooling Consistency
    needs: ci-skip
    if: needs.ci-skip.outputs.skip != 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .node-version

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24.5"
          cache-dependency-path: |
            go.work
            go.work.sum
            packages/workbench/service/go.mod
            packages/workspace/files/go.mod
            packages/workspace/issues/go.mod
            services/tuttid/go.mod
            services/tuttid/go.sum

      - name: Install pinned golangci-lint
        run: |
          version=$(tr -d '\n' < services/tuttid/.golangci-lint-version)
          install_dir="${HOME}/.local/bin"
          mkdir -p "${install_dir}"
          curl -sSfL https://golangci-lint.run/install.sh | sh -s -- -b "${install_dir}" "${version}"
          echo "${install_dir}" >> "${GITHUB_PATH}"

      - name: Check golangci-lint version pin
        run: node ./tools/scripts/setup-dev.mjs --only=golangci-lint

  ts-lint:
    name: TypeScript Lint
    needs: ci-skip
    if: needs.ci-skip.outputs.skip != 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.11.0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Check generated defaults
        run: pnpm check:defaults-generated

      - name: Check generated API artifacts
        run: pnpm check:api-generated

      - name: Check generated event protocol artifacts
        run: pnpm check:event-protocol-generated

      - name: Check UI boundaries
        run: pnpm check:ui-boundaries

      - name: Check renderer feature boundaries
        run: pnpm check:renderer-boundaries

      - name: Check i18n
        run: pnpm check:i18n

      - name: Run TypeScript lint
        env:
          NODE_OPTIONS: --max-old-space-size=4096
        run: pnpm lint:ts

  typecheck:
    name: Typecheck
    needs: ci-skip
    if: needs.ci-skip.outputs.skip != 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.11.0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Run workspace typecheck
        run: pnpm typecheck

  ts-tests:
    name: TypeScript Tests
    needs: ci-skip
    if: needs.ci-skip.outputs.skip != 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.11.0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Run TypeScript tests
        run: pnpm test:ts

  npm-package-packs:
    name: npm Package Pack Check
    needs: ci-skip
    if: needs.ci-skip.outputs.skip != 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.11.0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate package tarballs
        run: pnpm release:pack:check

  go-tests:
    name: Go Tests
    needs: ci-skip
    if: needs.ci-skip.outputs.skip != 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24.5"
          cache-dependency-path: |
            go.work
            go.work.sum
            packages/workbench/service/go.mod
            packages/workspace/files/go.mod
            packages/workspace/issues/go.mod
            services/tuttid/go.mod
            services/tuttid/go.sum

      - name: Run shared Workbench service tests
        working-directory: packages/workbench/service
        run: go test ./...

      - name: Run daemon tests
        working-directory: services/tuttid
        run: go test ./...

  go-lint:
    name: Go Lint
    needs: ci-skip
    if: needs.ci-skip.outputs.skip != 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24.5"
          cache-dependency-path: |
            go.work
            go.work.sum
            packages/workbench/service/go.mod
            packages/workspace/files/go.mod
            packages/workspace/issues/go.mod
            services/tuttid/go.mod
            services/tuttid/go.sum

      - name: Install pinned golangci-lint
        run: |
          version=$(tr -d '\n' < services/tuttid/.golangci-lint-version)
          install_dir="${HOME}/.local/bin"
          mkdir -p "${install_dir}"
          curl -sSfL https://golangci-lint.run/install.sh | sh -s -- -b "${install_dir}" "${version}"
          echo "${install_dir}" >> "${GITHUB_PATH}"

      - name: Run Go lint
        run: node ./tools/scripts/run-golangci-lint.mjs

  ci-check:
    name: CI Check
    needs:
      - ci-skip
      - tooling-consistency
      - ts-lint
      - typecheck
      - ts-tests
      - npm-package-packs
      - go-tests
      - go-lint
    if: always()
    runs-on: ubuntu-latest

    steps:
      - name: Verify required PR checks
        run: |
          if [ "${{ needs.ci-skip.result }}" != "success" ]; then
            echo "CI skip detection did not complete successfully."
            exit 1
          fi

          if [ "${{ needs.ci-skip.outputs.skip }}" = "true" ]; then
            echo "CI checks were temporarily skipped from the pull request checklist."
            exit 0
          fi

          results='${{ toJSON(needs) }}'
          failures=$(echo "$results" | jq -r 'to_entries[] | select(.key != "ci-skip") | select(.value.result != "success") | "\(.key)=\(.value.result)"')

          if [ -n "$failures" ]; then
            echo "One or more PR checks failed or were cancelled:"
            echo "$failures"
            exit 1
          fi

          echo "All required PR checks passed."
