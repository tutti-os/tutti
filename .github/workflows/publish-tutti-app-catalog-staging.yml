name: Publish Tutti App Catalog Staging

on:
  workflow_dispatch:
    inputs:
      catalog_mode:
        description: Catalog publish mode. Merge preserves existing apps; replace publishes only selected apps.
        required: true
        default: merge
        type: choice
        options:
          - merge
          - replace
      app_ids:
        description: Optional comma or newline separated remote app ids. In merge mode, leave empty to refresh the existing catalog.
        required: false
        type: string
      aws_region:
        description: AWS region. Defaults to staging vars, then production vars.
        required: false
        type: string
      aws_role_arn:
        description: AWS role ARN. Defaults to staging vars, then production vars.
        required: false
        type: string
      s3_bucket:
        description: S3 bucket. Defaults to staging vars, then production vars.
        required: false
        type: string
      s3_prefix:
        description: S3 prefix. Defaults to staging vars, then tutti-app-releases-staging.
        required: false
        type: string
      cloudfront_distribution_id:
        description: Optional CloudFront distribution id to invalidate after staging catalog upload.
        required: false
        type: string

permissions:
  contents: read
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      CATALOG_MODE: ${{ inputs.catalog_mode }}
      APP_IDS_INPUT: ${{ inputs.app_ids }}
      AWS_REGION_VALUE: ${{ inputs.aws_region || vars.TUTTI_APP_RELEASES_STAGING_AWS_REGION || vars.TUTTI_APP_RELEASES_AWS_REGION }}
      AWS_ROLE_ARN_VALUE: ${{ inputs.aws_role_arn || vars.TUTTI_APP_RELEASES_STAGING_AWS_ROLE_ARN || vars.TUTTI_APP_RELEASES_AWS_ROLE_ARN }}
      S3_BUCKET_VALUE: ${{ inputs.s3_bucket || vars.TUTTI_APP_RELEASES_STAGING_S3_BUCKET || vars.TUTTI_APP_RELEASES_S3_BUCKET }}
      S3_PREFIX_VALUE: ${{ inputs.s3_prefix || vars.TUTTI_APP_RELEASES_STAGING_S3_PREFIX || 'tutti-app-releases-staging' }}
      CLOUDFRONT_DISTRIBUTION_ID_VALUE: ${{ inputs.cloudfront_distribution_id || vars.TUTTI_APP_RELEASES_STAGING_CLOUDFRONT_DISTRIBUTION_ID || vars.TUTTI_APP_RELEASES_CLOUDFRONT_DISTRIBUTION_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .node-version

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Validate AWS configuration
        shell: bash
        run: |
          missing=()
          for name in AWS_REGION_VALUE AWS_ROLE_ARN_VALUE S3_BUCKET_VALUE; do
            if [ -z "${!name:-}" ]; then
              missing+=("${name}")
            fi
          done
          if [ "${#missing[@]}" -gt 0 ]; then
            printf 'Missing required AWS configuration: %s\n' "${missing[*]}" >&2
            exit 1
          fi

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION_VALUE }}
          role-to-assume: ${{ env.AWS_ROLE_ARN_VALUE }}

      - name: Resolve catalog app ids
        shell: bash
        run: |
          if [ "${CATALOG_MODE}" != "merge" ] && [ "${CATALOG_MODE}" != "replace" ]; then
            echo "Unknown catalog mode: ${CATALOG_MODE}" >&2
            exit 1
          fi

          app_ids_value="${APP_IDS_INPUT}"

          mkdir -p tutti-app-releases
          prefix="${S3_PREFIX_VALUE%/}"
          catalog_key="catalog.json"
          if [ -n "${prefix}" ]; then
            s3_root="s3://${S3_BUCKET_VALUE}/${prefix}"
            catalog_key="${prefix}/catalog.json"
          else
            s3_root="s3://${S3_BUCKET_VALUE}"
          fi

          if [ "${CATALOG_MODE}" = "merge" ]; then
            if aws s3api head-object --bucket "${S3_BUCKET_VALUE}" --key "${catalog_key}" >/dev/null 2>tutti-app-releases/catalog-head-error.txt; then
              aws s3 cp "${s3_root}/catalog.json" tutti-app-releases/existing-catalog.json
            elif grep -Eq "(404|Not Found|NoSuchKey)" tutti-app-releases/catalog-head-error.txt; then
              echo "No existing catalog found. Merge will publish selected app ids only." >&2
            else
              echo "Failed to check existing catalog. Refusing to publish a partial merge catalog." >&2
              cat tutti-app-releases/catalog-head-error.txt >&2
              exit 1
            fi
          fi

          if [ -z "${app_ids_value}" ] && [ "${CATALOG_MODE}" = "merge" ] && [ -f tutti-app-releases/existing-catalog.json ]; then
            existing_app_ids="$(node -e '
              const fs = require("fs");
              const catalog = JSON.parse(fs.readFileSync(process.argv[1], "utf8"));
              const appIds = new Set(
                (catalog.apps ?? []).map((app) => app?.manifest?.appId)
              );
              for (const appId of Object.keys(catalog.compatibility?.apps ?? {})) {
                appIds.add(appId);
              }
              for (const appId of [...appIds].filter(Boolean).map((value) => value.trim()).filter(Boolean).sort()) {
                console.log(appId);
              }
            ' tutti-app-releases/existing-catalog.json)"
            app_ids_value="${existing_app_ids}"
          fi

          : > tutti-app-releases/app-ids.txt
          while IFS= read -r app_id; do
            app_id="$(echo "${app_id}" | xargs)"
            if [ -z "${app_id}" ]; then
              continue
            fi
            printf '%s\n' "${app_id}" >> tutti-app-releases/app-ids.txt
          done < <(printf '%s\n' "${app_ids_value}" | tr ',' '\n')

          if [ ! -s tutti-app-releases/app-ids.txt ]; then
            echo "At least one app id is required" >&2
            exit 1
          fi

      - name: Publish app catalog
        shell: bash
        run: |
          args=(
            --s3-bucket "${S3_BUCKET_VALUE}"
            --s3-prefix "${S3_PREFIX_VALUE}"
            --mode "${CATALOG_MODE}"
            --output-dir tutti-app-catalog
          )
          while IFS= read -r app_id; do
            args+=(--app-id "${app_id}")
          done < tutti-app-releases/app-ids.txt
          pnpm --package @tutti-os/app-release-tools@latest dlx publish-tutti-app-catalog "${args[@]}"

      - name: Verify app catalog artifacts
        shell: bash
        run: |
          pnpm --package @tutti-os/app-release-tools@latest dlx verify-tutti-app-release-artifacts \
            --catalog-file tutti-app-catalog/catalog.json

      - name: Invalidate CloudFront catalog
        if: env.CLOUDFRONT_DISTRIBUTION_ID_VALUE != ''
        shell: bash
        run: |
          prefix="${S3_PREFIX_VALUE%/}"
          if [ -n "${prefix}" ]; then
            path_to_invalidate="/${prefix}/catalog.json"
          else
            path_to_invalidate="/catalog.json"
          fi
          aws cloudfront create-invalidation \
            --distribution-id "${CLOUDFRONT_DISTRIBUTION_ID_VALUE}" \
            --paths "${path_to_invalidate}"
